<!doctype html>
<html lang="nl">
<head><meta charset="utf-8"><title>Shadow</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 40px; }
  .box { background: #fff; border-radius: 12px; padding: 28px; box-shadow: var(--shadow-md); display: flex; align-items: center; justify-content: space-between; }
  .meta { display: flex; flex-direction: column; gap: 6px; }
  .name { font-size: 22px; font-weight: 800; color: var(--ink); }
  .css { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 12px; color: var(--ink-60); }
  .badge { font-size: 11px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: var(--brass); }
</style>
</head>
<body>
  <div class="box">
    <div class="meta">
      <span class="badge">Eén schaduw, één regel</span>
      <span class="name">shadow-md</span>
      <span class="css">0 2px 12px rgba(28, 43, 58, 0.08)</span>
    </div>
    <div style="font-size:11px;font-weight:500;color:var(--ink-60);max-width:180px;text-align:right;letter-spacing:0.04em">
      Alleen op kaarten. Geen elevation-levels, geen inner-shadows.
    </div>
  </div>
</body>
</html>
