<!doctype html>
<html lang="nl">
<head><meta charset="utf-8"><title>Neutrals</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 28px; }
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; }
  .cell { border-radius: 10px; padding: 14px 16px; height: 110px; display: flex; flex-direction: column; justify-content: space-between; }
  .name { font-weight: 800; font-size: 16px; }
  .hex { font-size: 12px; font-weight: 500; opacity: 0.7; }
  .role { font-size: 11px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; opacity: 0.65; }
</style>
</head>
<body>
  <div class="grid">
    <div class="cell" style="background:#1C2B3A;color:#fff"><span class="role">100</span><div><div class="name">ink</div><div class="hex">#1C2B3A</div></div></div>
    <div class="cell" style="background:#3D4856;color:#fff"><span class="role">80</span><div><div class="name">ink-80</div><div class="hex">#3D4856</div></div></div>
    <div class="cell" style="background:#6B7480;color:#fff"><span class="role">60</span><div><div class="name">ink-60</div><div class="hex">#6B7480</div></div></div>
    <div class="cell" style="background:#D4D8DD;color:#1C2B3A"><span class="role">20</span><div><div class="name">ink-20</div><div class="hex">#D4D8DD</div></div></div>
    <div class="cell" style="background:#E8EAEE;color:#1C2B3A"><span class="role">10</span><div><div class="name">ink-10</div><div class="hex">#E8EAEE</div></div></div>
  </div>
</body>
</html>
