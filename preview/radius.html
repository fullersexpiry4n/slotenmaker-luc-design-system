<!doctype html>
<html lang="nl">
<head><meta charset="utf-8"><title>Radius</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 32px; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 18px; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .shape { width: 100px; height: 64px; background: var(--ink); }
  .label { font-size: 12px; font-weight: 500; color: var(--ink-60); letter-spacing: 0.08em; text-transform: uppercase; }
  .value { font-size: 14px; font-weight: 800; color: var(--ink); }
</style>
</head>
<body>
  <div class="grid">
    <div class="item"><div class="shape" style="border-radius:8px"></div><span class="value">8px</span><span class="label">Knop · input</span></div>
    <div class="item"><div class="shape" style="border-radius:8px;background:var(--photo-bg);border:1px solid var(--ink-20)"></div><span class="value">8px</span><span class="label">Foto</span></div>
    <div class="item"><div class="shape" style="border-radius:12px;background:#fff;box-shadow:var(--shadow-md)"></div><span class="value">12px</span><span class="label">Kaart</span></div>
    <div class="item"><div class="shape" style="width:80px;border-radius:999px;background:var(--brass)"></div><span class="value">999px</span><span class="label">Pill · chip</span></div>
  </div>
</body>
</html>
