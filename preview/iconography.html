<!doctype html>
<html lang="nl">
<head><meta charset="utf-8"><title>Iconography</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 28px; }
  .group { margin-bottom: 18px; }
  .label { font-size: 11px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-60); margin-bottom: 12px; }
  .row { display: flex; gap: 22px; align-items: center; }
  .ic { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .ic svg { color: var(--ink); }
  .ic span { font-size: 11px; font-weight: 500; color: var(--ink-60); }
  .brand { background: var(--ink); border-radius: 10px; padding: 14px 22px; display: inline-flex; }
</style>
</head>
<body>
  <div class="group">
    <div class="label">Brand mark — koperen sleutel</div>
    <div class="row">
      <div class="brand">
        <svg viewBox="0 0 64 64" width="56" height="56" fill="#C8953A"><path d="M20 32a12 12 0 1 1 24 0 12 12 0 0 1-24 0Zm12-6a6 6 0 1 0 0 12 6 6 0 0 0 0-12Z"/><rect x="42" y="29" width="18" height="6" rx="1"/><rect x="50" y="35" width="4" height="6" rx="1"/><rect x="56" y="35" width="4" height="5" rx="1"/></svg>
      </div>
      <span style="font-size:13px;color:var(--ink-60);max-width:260px;line-height:1.5">Eén geel-koper SVG. Alleen op favicon, achterkant visitekaart, magneet.</span>
    </div>
  </div>
  <div class="group">
    <div class="label">UI icons — Lucide, stroke 1.75</div>
    <div class="row">
      <div class="ic"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.37 1.9.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.91.33 1.85.57 2.81.7A2 2 0 0 1 22 16.92Z"/></svg><span>phone</span></div>
      <div class="ic"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><circle cx="7.5" cy="15.5" r="5.5"/><path d="m21 2-9.6 9.6"/><path d="m15.5 7.5 3 3L22 7l-3-3"/></svg><span>key</span></div>
      <div class="ic"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg><span>clock</span></div>
      <div class="ic"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"/><path d="m9 12 2 2 4-4"/></svg><span>shield-check</span></div>
      <div class="ic"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M20 10c0 4.993-5.539 10.193-7.399 11.799a1 1 0 0 1-1.202 0C9.539 20.193 4 14.993 4 10a8 8 0 0 1 16 0"/><circle cx="12" cy="10" r="3"/></svg><span>map-pin</span></div>
      <div class="ic"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="m5 12 5 5L20 7"/></svg><span>check</span></div>
      <div class="ic"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg><span>arrow-right</span></div>
    </div>
  </div>
</body>
</html>
