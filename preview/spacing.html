<!doctype html>
<html lang="nl">
<head><meta charset="utf-8"><title>Spacing</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 28px; }
  .row { display: flex; align-items: center; gap: 14px; padding: 5px 0; }
  .name { width: 70px; font-size: 12px; font-weight: 500; color: var(--ink-60); letter-spacing: 0.08em; text-transform: uppercase; }
  .bar { height: 16px; background: var(--ink); border-radius: 3px; }
  .px { font-size: 12px; font-weight: 500; color: var(--ink-80); }
</style>
</head>
<body>
  <div class="row"><span class="name">space-1</span><div class="bar" style="width:4px"></div><span class="px">4px</span></div>
  <div class="row"><span class="name">space-2</span><div class="bar" style="width:8px"></div><span class="px">8px</span></div>
  <div class="row"><span class="name">space-3</span><div class="bar" style="width:12px"></div><span class="px">12px</span></div>
  <div class="row"><span class="name">space-4</span><div class="bar" style="width:16px"></div><span class="px">16px</span></div>
  <div class="row"><span class="name">space-5</span><div class="bar" style="width:24px"></div><span class="px">24px</span></div>
  <div class="row"><span class="name">space-6</span><div class="bar" style="width:32px"></div><span class="px">32px</span></div>
  <div class="row"><span class="name">space-7</span><div class="bar" style="width:48px"></div><span class="px">48px</span></div>
  <div class="row"><span class="name">space-8</span><div class="bar" style="width:64px"></div><span class="px">64px</span></div>
  <div class="row"><span class="name">space-9</span><div class="bar" style="width:96px"></div><span class="px">96px · 8px basis</span></div>
</body>
</html>
