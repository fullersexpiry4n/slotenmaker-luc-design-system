<!doctype html>
<html lang="nl">
<head><meta charset="utf-8"><title>Overlines & casing</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 32px; display: grid; grid-template-columns: 1fr 1fr; gap: 32px; }
  .group { display: flex; flex-direction: column; gap: 12px; }
  .label { font-size: 11px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-60); }
  .overline { font-size: 12px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: var(--brass); }
  .heading { font-size: 28px; font-weight: 800; line-height: 1.15; color: var(--ink); }
  .bad { text-decoration: line-through; color: var(--ink-60); }
  .check { color: var(--success); font-size: 12px; font-weight: 500; }
  .cross { color: var(--alert); font-size: 12px; font-weight: 500; }
</style>
</head>
<body>
  <div class="group">
    <div class="label">Overline — max 3 woorden</div>
    <span class="overline">Snelle hulp</span>
    <span class="overline">Vast tarief</span>
    <span class="overline">5 jaar garantie</span>
    <span class="check">CAPS · letter-spacing 0.12em</span>
  </div>
  <div class="group">
    <div class="label">Casing — koppen</div>
    <div class="heading">Slot vervangen na inbraak</div>
    <div class="heading bad">Slot Vervangen Na Inbraak</div>
    <span class="check">Sentence case — altijd</span>
    <span class="cross">Title Case — nooit</span>
  </div>
</body>
</html>
