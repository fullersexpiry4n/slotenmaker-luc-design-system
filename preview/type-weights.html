<!doctype html>
<html lang="nl">
<head><meta charset="utf-8"><title>Type weights</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 32px; }
  .row { display: flex; align-items: baseline; gap: 24px; padding: 12px 0; border-bottom: 1px solid var(--ink-10); }
  .row:last-child { border-bottom: none; }
  .sample { font-size: 28px; color: var(--ink); flex: 1; }
  .meta { font-size: 11px; color: var(--ink-60); letter-spacing: 0.1em; text-transform: uppercase; font-weight: 500; width: 200px; text-align: right; }
</style>
</head>
<body>
  <div class="row"><span class="sample" style="font-weight:800">Inter ExtraBold — koppen</span><span class="meta">800 · Headings</span></div>
  <div class="row"><span class="sample" style="font-weight:500">Inter Medium — labels en nav</span><span class="meta">500 · UI</span></div>
  <div class="row"><span class="sample" style="font-weight:400">Inter Regular — body en quotes</span><span class="meta">400 · Body</span></div>
</body>
</html>
