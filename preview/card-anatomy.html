<!doctype html>
<html lang="nl">
<head><meta charset="utf-8"><title>Card anatomy</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 28px; background: var(--canvas); }
  .card-demo { background: #fff; border-radius: 12px; box-shadow: var(--shadow-md); padding: 24px; display: flex; gap: 20px; align-items: center; }
  .icon-wrap { width: 56px; height: 56px; border-radius: 8px; background: rgba(200,149,58,0.14); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .body { flex: 1; }
  .pre { font-size: 11px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: var(--brass); margin-bottom: 6px; }
  .ttl { font-size: 22px; font-weight: 800; color: var(--ink); line-height: 1.2; margin-bottom: 6px; }
  .desc { font-size: 14px; color: var(--ink-80); line-height: 1.5; }
  .price { font-size: 22px; font-weight: 800; color: var(--ink); }
  .price small { font-size: 12px; font-weight: 500; color: var(--ink-60); display: block; margin-top: 2px; letter-spacing: 0; }
</style>
</head>
<body>
  <div class="card-demo">
    <div class="icon-wrap">
      <svg viewBox="0 0 64 64" width="36" height="36" fill="#C8953A"><path d="M20 32a12 12 0 1 1 24 0 12 12 0 0 1-24 0Zm12-6a6 6 0 1 0 0 12 6 6 0 0 0 0-12Z"/><rect x="42" y="29" width="18" height="6" rx="1"/><rect x="50" y="35" width="4" height="6" rx="1"/><rect x="56" y="35" width="4" height="5" rx="1"/></svg>
    </div>
    <div class="body">
      <div class="pre">Snelle hulp</div>
      <div class="ttl">Slot vervangen na inbraak</div>
      <div class="desc">Nieuwe cilinder, ingebouwd en getest. Klaar binnen 45 minuten.</div>
    </div>
    <div class="price">€145<small>vast tarief</small></div>
  </div>
</body>
</html>
