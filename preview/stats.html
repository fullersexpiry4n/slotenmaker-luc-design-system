<!doctype html>
<html lang="nl">
<head><meta charset="utf-8"><title>Stat block</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 32px; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 24px; }
  .stat { border-left: 2px solid var(--brass); padding-left: 16px; }
  .num { font-size: 40px; font-weight: 800; color: var(--ink); line-height: 1; letter-spacing: -0.02em; }
  .unit { font-size: 18px; font-weight: 800; color: var(--brass); margin-left: 2px; }
  .ctx { font-size: 13px; font-weight: 500; color: var(--ink-60); margin-top: 10px; line-height: 1.4; }
</style>
</head>
<body>
  <div class="stat">
    <div><span class="num">30</span><span class="unit">min</span></div>
    <div class="ctx">Gemiddelde aanrijtijd in de regio</div>
  </div>
  <div class="stat">
    <div><span class="num">5</span><span class="unit">jaar</span></div>
    <div class="ctx">Garantie op elke nieuwe cilinder</div>
  </div>
  <div class="stat">
    <div><span class="num">€85</span></div>
    <div class="ctx">Vast tarief — geen voorrijkost</div>
  </div>
</body>
</html>
